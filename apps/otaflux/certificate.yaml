apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otaflux
spec:
  isCA: false
  commonName: otaflux.homie.e10n.me
  dnsNames:
    - otaflux.homie.e10n.me
  secretName: otaflux-certs
  issuerRef:
    name: selfsigned-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  duration: 87600h # 10 years
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    encoding: PKCS1
    size: 256
  usages:
    - digital signature
    - key encipherment
    - server auth
