apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - certificate.yaml
  - http-route.yaml
  - namespace.yaml
  - reference-grant.yaml

namespace: otaflux

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: otaflux
      app.kubernetes.io/name: otaflux

helmCharts:
  - name: otaflux
    repo: oci://ghcr.io/etiennetremel/helm-charts
    version: v0.1.3
    releaseName: otaflux
    valuesFile: otaflux-values.yaml
